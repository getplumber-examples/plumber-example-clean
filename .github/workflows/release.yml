name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

# Serialize releases; never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    # Reviewers / wait timer / deployment branch rules are enforced on this
    # environment in the repo settings (Settings -> Environments -> production).
    environment: production
    permissions:
      contents: read
      id-token: write # OIDC: npm provenance + cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.x"
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign the package tarball
        run: cosign sign-blob --yes acme-widget-utils-*.tgz --output-signature acme-widget-utils.tgz.sig
      # Trusted publishing: OIDC + provenance, no long-lived NPM_TOKEN.
      - run: npm publish --provenance --access public
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-tarball
          path: |
            acme-widget-utils-*.tgz
            acme-widget-utils.tgz.sig
